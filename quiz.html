<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz — Lucas Mendes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .terminal {
      width: 100%;
      max-width: 680px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(168, 85, 247, 0.15);
    }

    .titlebar {
      background: #161b22;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot { width: 14px; height: 14px; border-radius: 50%; }
    .dot.red    { background: #ff5f57; }
    .dot.yellow { background: #febc2e; }
    .dot.green  { background: #28c840; }
    .titlebar span {
      flex: 1;
      text-align: center;
      font-size: 12px;
      color: #8b949e;
    }

    .body { padding: 28px 28px 32px; }

    .intro {
      margin-bottom: 28px;
      line-height: 1.7;
    }
    .intro .prompt { color: #a855f7; }
    .intro .cmd    { color: #79c0ff; }
    .intro p       { color: #8b949e; font-size: 13px; margin-top: 6px; padding-left: 16px; }

    /* quiz */
    .question-block {
      display: none;
      animation: fadeIn 0.4s ease;
    }
    .question-block.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .q-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 16px;
    }
    .q-num { color: #a855f7; font-size: 13px; white-space: nowrap; }
    .q-text { font-size: 15px; color: #e6edf3; line-height: 1.5; }

    .options { display: flex; flex-direction: column; gap: 10px; }

    .option {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 16px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: #e6edf3;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .option:hover:not(:disabled) {
      border-color: #a855f7;
      background: #1a1230;
    }
    .option .letter {
      color: #a855f7;
      font-weight: bold;
      min-width: 18px;
    }
    .option.correct {
      border-color: #3fb950;
      background: #0d2117;
      color: #3fb950;
    }
    .option.correct .letter { color: #3fb950; }
    .option.wrong {
      border-color: #f85149;
      background: #1e0e0e;
      color: #f85149;
    }
    .option.wrong .letter { color: #f85149; }
    .option.reveal-correct {
      border-color: #3fb950;
      background: #0d2117;
      color: #3fb950;
      opacity: 0.6;
    }
    .option.reveal-correct .letter { color: #3fb950; }
    .option:disabled { cursor: default; }

    .feedback {
      margin-top: 14px;
      font-size: 13px;
      min-height: 20px;
      padding-left: 4px;
      display: none;
    }
    .feedback.show { display: block; animation: fadeIn 0.3s ease; }
    .feedback.ok  { color: #3fb950; }
    .feedback.err { color: #f85149; }

    .next-btn {
      margin-top: 20px;
      background: transparent;
      border: 1px solid #a855f7;
      border-radius: 8px;
      color: #a855f7;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 10px 20px;
      cursor: pointer;
      display: none;
      transition: background 0.2s;
    }
    .next-btn.show { display: inline-block; animation: fadeIn 0.3s ease; }
    .next-btn:hover { background: #1a1230; }

    /* progress */
    .progress-bar {
      height: 3px;
      background: #21262d;
      border-radius: 2px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #a855f7, #79c0ff);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* result */
    .result {
      display: none;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }
    .result.show { display: block; }
    .result .score {
      font-size: 52px;
      font-weight: bold;
      color: #a855f7;
      margin: 12px 0 4px;
    }
    .result .score-label { color: #8b949e; font-size: 13px; margin-bottom: 24px; }
    .result .message { font-size: 15px; color: #e6edf3; margin-bottom: 28px; line-height: 1.6; }
    .result .breakdown { text-align: left; margin-bottom: 28px; }
    .result .b-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      padding: 8px 0;
      border-bottom: 1px solid #21262d;
      color: #8b949e;
    }
    .result .b-item:last-child { border-bottom: none; }
    .result .b-icon { font-size: 16px; min-width: 20px; text-align: center; }
    .restart-btn {
      background: transparent;
      border: 1px solid #a855f7;
      border-radius: 8px;
      color: #a855f7;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 12px 28px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .restart-btn:hover { background: #1a1230; }

    .divider { border: none; border-top: 1px solid #21262d; margin: 20px 0; }
  </style>
</head>
<body>
<div class="terminal">
  <div class="titlebar">
    <div class="dot red"></div>
    <div class="dot yellow"></div>
    <div class="dot green"></div>
    <span>quiz@lucas-mendes: ~/me</span>
  </div>

  <div class="body">
    <div class="intro">
      <div><span class="prompt">❯ </span><span class="cmd">./quiz --sobre lucas</span></div>
      <p>Você acha que me conhece? Responda as perguntas e descubra.</p>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress" style="width: 0%"></div>
    </div>

    <div id="quiz-area">
      <!-- questões renderizadas via JS -->
    </div>

    <div class="result" id="result">
      <div class="score" id="score-num"></div>
      <div class="score-label" id="score-label"></div>
      <div class="message" id="result-msg"></div>
      <div class="breakdown" id="breakdown"></div>
      <button class="restart-btn" onclick="restart()">❯ jogar novamente</button>
    </div>
  </div>
</div>

<script>
  const questions = [
    {
      q: "Qual é o modo de trabalho do Lucas?",
      options: ["Full Stack Developer", "Vibecoder IA", "DevOps Engineer", "Data Scientist"],
      correct: 1,
      feedback: {
        ok: "Exato! Meio humano, meio prompt. 🤖",
        err: "Errou! Lucas é um Vibecoder — deixa a IA digitar e revisa o resultado."
      }
    },
    {
      q: "Quais ferramentas de automação o Lucas utiliza?",
      options: ["Zapier e Make", "Power Automate e UiPath", "n8n e Google Apps Script", "Selenium e Puppeteer"],
      correct: 2,
      feedback: {
        ok: "Isso aí! n8n e Google Apps Script são as ferramentas do dia a dia. ⚡",
        err: "Errou! As ferramentas são n8n e Google Apps Script."
      }
    },
    {
      q: "O que está em vias de aposentadoria na vida do Lucas?",
      options: ["O mouse", "O monitor", "O café", "O teclado"],
      correct: 3,
      feedback: {
        ok: "Haha, correto! A IA está assumindo o controle do teclado. ⌨️🪦",
        err: "Errou! O teclado está quase aposentado — a IA faz a parte difícil."
      }
    },
    {
      q: "Em qual área de dados o Lucas atua?",
      options: ["Machine Learning", "Business Intelligence", "Data Engineering", "Big Data"],
      correct: 1,
      feedback: {
        ok: "Certo! BI é uma das especialidades do Lucas. 📊",
        err: "Errou! A área é Business Intelligence."
      }
    },
    {
      q: "O que o Lucas é responsável na infra?",
      options: ["Banco de dados on-premise", "Redes e switches", "VPS e servidores Linux", "Cloud AWS"],
      correct: 2,
      feedback: {
        ok: "Isso! VPS e Linux fazem parte do kit. 🖥️",
        err: "Errou! Lucas cuida de VPS e servidores Linux."
      }
    }
  ];

  const letters = ['A', 'B', 'C', 'D'];
  let current = 0;
  let score = 0;
  let answered = [];

  function buildQuestion(index) {
    const q = questions[index];
    const block = document.createElement('div');
    block.className = 'question-block active';
    block.id = `q-${index}`;

    block.innerHTML = `
      <div class="q-header">
        <span class="q-num">❯ [${index + 1}/${questions.length}]</span>
        <span class="q-text">${q.q}</span>
      </div>
      <div class="options" id="opts-${index}">
        ${q.options.map((opt, i) => `
          <button class="option" onclick="answer(${index}, ${i})" id="opt-${index}-${i}">
            <span class="letter">${letters[i]}.</span> ${opt}
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="fb-${index}"></div>
      <button class="next-btn" id="next-${index}" onclick="next(${index})">
        ${index + 1 < questions.length ? '❯ próxima pergunta' : '❯ ver resultado'}
      </button>
    `;
    return block;
  }

  function answer(qIndex, optIndex) {
    const q = questions[qIndex];
    const buttons = document.querySelectorAll(`#opts-${qIndex} .option`);
    const fb = document.getElementById(`fb-${qIndex}`);
    const nextBtn = document.getElementById(`next-${qIndex}`);
    const isCorrect = optIndex === q.correct;

    buttons.forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.correct && !isCorrect) btn.classList.add('reveal-correct');
    });

    if (isCorrect) {
      buttons[optIndex].classList.add('correct');
      fb.textContent = '✓ ' + q.feedback.ok;
      fb.className = 'feedback show ok';
      score++;
    } else {
      buttons[optIndex].classList.add('wrong');
      fb.textContent = '✗ ' + q.feedback.err;
      fb.className = 'feedback show err';
    }

    answered.push(isCorrect);
    nextBtn.classList.add('show');
    updateProgress(qIndex + 1);
  }

  function next(qIndex) {
    document.getElementById(`q-${qIndex}`).style.display = 'none';
    current++;

    if (current < questions.length) {
      const area = document.getElementById('quiz-area');
      area.appendChild(buildQuestion(current));
    } else {
      showResult();
    }
  }

  function updateProgress(done) {
    const pct = (done / questions.length) * 100;
    document.getElementById('progress').style.width = pct + '%';
  }

  function showResult() {
    document.getElementById('quiz-area').style.display = 'none';
    const result = document.getElementById('result');
    result.classList.add('show');

    document.getElementById('score-num').textContent = `${score}/${questions.length}`;
    document.getElementById('score-label').textContent = 'respostas corretas';

    const msgs = [
      "Você não me conhece nada. Dá uma olhada no perfil! 👀",
      "Quase nada... Precisamos nos conhecer melhor. 😄",
      "Razoável! Você prestou atenção em algumas coisas.",
      "Bom! Você leu o README com atenção. 👍",
      "Mandou bem demais! Você é praticamente meu clone. 🤖"
    ];
    const msgIndex = score === 0 ? 0 : score === 1 ? 1 : score === 2 ? 2 : score === 3 || score === 4 ? 3 : 4;
    document.getElementById('result-msg').textContent = msgs[msgIndex];

    const breakdown = document.getElementById('breakdown');
    breakdown.innerHTML = answered.map((ok, i) => `
      <div class="b-item">
        <span class="b-icon">${ok ? '✓' : '✗'}</span>
        <span style="color: ${ok ? '#3fb950' : '#f85149'}">${questions[i].q}</span>
      </div>
    `).join('');
  }

  function restart() {
    current = 0;
    score = 0;
    answered = [];
    document.getElementById('progress').style.width = '0%';
    document.getElementById('result').classList.remove('show');
    const area = document.getElementById('quiz-area');
    area.style.display = '';
    area.innerHTML = '';
    area.appendChild(buildQuestion(0));
  }

  // init
  document.getElementById('quiz-area').appendChild(buildQuestion(0));
</script>
</body>
</html>
